name: Build Release APK (Auto Keystore)

on:
  workflow_dispatch:

jobs:
  build-release-apk-auto:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/lcaissier-printer-app

    env:
      AUTO_KEYSTORE_FILE: release-auto.jks
      AUTO_KEY_ALIAS: lcaissier
      AUTO_KEYSTORE_PASSWORD: changeit123
      AUTO_KEY_PASSWORD: changeit123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
          cache-disabled: true

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore $AUTO_KEYSTORE_FILE \
            -storepass $AUTO_KEYSTORE_PASSWORD \
            -keypass $AUTO_KEY_PASSWORD \
            -alias $AUTO_KEY_ALIAS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=LCAISSIER, OU=POS, O=LCAISSIER, L=Casablanca, ST=Casablanca, C=MA"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/lcaissier-printer-app/release-auto.jks
          ANDROID_KEYSTORE_PASSWORD: changeit123
          ANDROID_KEY_ALIAS: lcaissier
          ANDROID_KEY_PASSWORD: changeit123
        run: gradle :app:assembleRelease --no-daemon --refresh-dependencies

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcaissier-pos-release-apk-auto
          path: android/lcaissier-printer-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload generated keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcaissier-keystore-auto
          path: android/lcaissier-printer-app/release-auto.jks
          if-no-files-found: error
